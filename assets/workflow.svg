<text x="120" y="650" class="layer">

ROBOT EXECUTION

</text>

<line x1="120" y1="660" x2="1480" y2="660" class="line"/>

<rect class="box"
x="160"
y="700"
width="240"
height="120"/>

<text class="heading"
x="280"
y="745"
text-anchor="middle">

Bluetooth

