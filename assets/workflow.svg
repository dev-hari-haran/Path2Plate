<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#fafafa"/>
<stop offset="100%" stop-color="#f3f4f6"/>
</linearGradient>

<linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#76B900"/>
<stop offset="100%" stop-color="#5AA000"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="12"
flood-opacity="0.10"/>
</filter>

<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="8"
refY="3"
orient="auto">

<path d="M0,0 L8,3 L0,6"
fill="#76B900"/>

</marker>

<style>

.title{
font:700 44px 'Segoe UI',Arial,sans-serif;
fill:#111827;
}

.subtitle{
font:18px 'Segoe UI',Arial,sans-serif;
fill:#6b7280;
}

.layer{
font:700 18px 'Segoe UI';
fill:#76B900;
letter-spacing:2px;
}

.heading{
font:700 24px 'Segoe UI';
fill:#111827;
}

.text{
font:16px 'Segoe UI';
fill:#6b7280;
}

.box{
fill:#fff;
stroke:#e5e7eb;
stroke-width:2;
rx:18;
filter:url(#shadow);
}

.arrow{
stroke:#76B900;
stroke-width:3;
fill:none;
marker-end:url(#arrow);
}

.line{
stroke:#d1d5db;
stroke-width:1.5;
}

</style>

</defs>

<rect width="100%" height="100%" fill="url(#bg)"/>

<text x="800" y="70"
text-anchor="middle"
class="title">

Path2Plate Workflow

</text>

<text x="800" y="105"
