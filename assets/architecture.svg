<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">

<defs>

<style>

.title{
font:700 44px Inter,Segoe UI,Arial,sans-serif;
fill:#111827;
}

.subtitle{
font:18px Inter,Segoe UI,Arial,sans-serif;
fill:#6B7280;
}

.layer{
font:700 16px Inter;
letter-spacing:2px;
fill:#76B900;
}

.heading{
font:700 24px Inter;
fill:#111827;
}

.text{
font:16px Inter;
fill:#6B7280;
}

.box{
fill:#ffffff;
stroke:#E5E7EB;
stroke-width:2;
rx:20;
}

.arrow{
stroke:#76B900;
stroke-width:3;
fill:none;
marker-end:url(#arrow);
}

</style>

<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="8"
