<svg xmlns="http://www.w3.org/2000/svg"
     width="1600"
     height="650"
     viewBox="0 0 1600 650">

<defs>

<style>

.title{
font:700 42px Inter,Segoe UI,Arial,sans-serif;
fill:#111827;
}

.subtitle{
font:18px Inter,Segoe UI,Arial,sans-serif;
fill:#6B7280;
}

.box{
fill:#ffffff;
stroke:#E5E7EB;
stroke-width:2;
rx:18;
}

.step{
font:700 22px Inter;
fill:#111827;
}

.desc{
font:16px Inter;
fill:#6B7280;
}

.number{
font:700 18px Inter;
fill:#76B900;
}

.arrow{
stroke:#76B900;
stroke-width:3;
fill:none;
marker-end:url(#arrow);
}

</style>

<marker id="arrow"
markerWidth="10"
markerHeight="10"
refX="8"
refY="3"
orient="auto">

<path d="M0,0 L8,3 L0,6"
fill="#76B900"/>

</marker>

</defs>

<rect width="100%" height="100%" fill="#F9FAFB"/>

<!-- Header -->

<text x="800"
y="70"
class="title"
text-anchor="middle">

QR Verification Workflow

</text>

<text x="800"
y="105"
class="subtitle"
text-anchor="middle">

Secure Delivery Authentication Before Food Handover

</text>

<!-- Step 1 -->

<rect class="box"
x="60"
y="190"
width="250"
height="280"/>

<text x="90"
y="235"
class="number">

01

</text>

<text x="185"
y="245"
text-anchor="middle"
class="step">

Restaurant

</text>

<text x="185"
y="285"
text-anchor="middle"
class="desc">

Generate Order

</text>

<text x="185"
y="315"
text-anchor="middle"
class="desc">

Create Unique

</text>

<text x="185"
y="345"
text-anchor="middle"
class="desc">

QR Token

</text>

<!-- Step 2 -->

<rect class="box"
x="370"
y="190"
width="250"
height="280"/>

<text x="400"
y="235"
class="number">

02

</text>

<text x="495"
y="245"
text-anchor="middle"
class="step">

Delivery Robot

</text>

<text x="495"
y="285"
text-anchor="middle"
class="desc">

Navigate Using

</text>

<text x="495"
y="315"
text-anchor="middle"
class="desc">

Bluetooth Control

</text>

<!-- Step 3 -->

<rect class="box"
x="680"
y="190"
width="250"
height="280"/>

<text x="710"
y="235"
class="number">

03

</text>

<text x="805"
y="245"
text-anchor="middle"
class="step">

Customer

</text>

<text x="805"
y="285"
text-anchor="middle"
class="desc">

Present

</text>

<text x="805"
y="315"
text-anchor="middle"
class="desc">

QR Code

</text>

<!-- Step 4 -->

<rect class="box"
x="990"
y="190"
width="250"
height="280"/>

<text x="1020"
y="235"
class="number">

04

</text>

<text x="1115"
y="245"
text-anchor="middle"
class="step">

Verification

</text>

<text x="1115"
y="285"
text-anchor="middle"
class="desc">

Compare Order

</text>

<text x="1115"
y="315"
text-anchor="middle"
class="desc">

Authentication

</text>

<!-- Step 5 -->

<rect class="box"
x="1300"
y="190"
width="250"
height="280"/>

<text x="1330"
y="235"
class="number">

05

</text>

<text x="1425"
y="245"
text-anchor="middle"
class="step">

Delivery

</text>

<text x="1425"
y="285"
text-anchor="middle"
class="desc">

Food Released

</text>

<text x="1425"
y="315"
text-anchor="middle"
class="desc">

Successfully

</text>

<!-- Connectors -->

<path class="arrow"
d="M310 330 L370 330"/>

<path class="arrow"
d="M620 330 L680 330"/>

<path class="arrow"
d="M930 330 L990 330"/>

<path class="arrow"
d="M1240 330 L1300 330"/>

<!-- Security Note -->

<rect
x="370"
y="540"
width="860"
height="60"
rx="14"
fill="#ECFDF5"
stroke="#76B900"
stroke-width="2"/>

<text
x="800"
y="578"
text-anchor="middle"
font-family="Inter"
font-size="18"
font-weight="600"
fill="#166534">

✔ Delivery is completed only after successful QR authentication.

</text>

</svg>